<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Define the EventEcos geometric logo as favicon -->
  <!-- Cyan bottom left diagonal stripe -->
  <path d="M 8 32 L 20 20 L 32 32 L 20 44 Z" fill="#00BFA5"/>
  
  <!-- Green middle diagonal stripe -->
  <path d="M 16 24 L 32 8 L 48 24 L 32 40 Z" fill="#26C485"/>
  
  <!-- Navy blue top right diagonal stripe -->
  <path d="M 24 16 L 44 -4 L 56 8 L 40 28 Z" fill="#1E3A7F"/>
  
  <!-- White connecting stripes and circles -->
  <!-- Cyan circle bottom left -->
  <circle cx="20" cy="44" r="6" fill="white" stroke="none"/>
  <circle cx="20" cy="44" r="3" fill="#00BFA5"/>
  
  <!-- Green circle middle -->
  <circle cx="32" cy="32" r="6" fill="white" stroke="none"/>
  <circle cx="32" cy="32" r="3" fill="#26C485"/>
  
  <!-- Navy blue circle top right -->
  <circle cx="44" cy="20" r="6" fill="white" stroke="none"/>
  <circle cx="44" cy="20" r="3" fill="#1E3A7F"/>
</svg>
