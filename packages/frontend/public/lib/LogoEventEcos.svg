<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70">
  <!-- Leaf and network icon -->
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D443;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0064FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g>
    <!-- Outer leaf curve -->
    <path d="M 10 10 Q 25 5 35 20 Q 40 35 28 48 Q 18 55 8 45 Q 2 30 10 20 Z" 
          fill="none" stroke="url(#leafGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner stem and branches -->
    <path d="M 8 45 L 18 28" stroke="url(#leafGradient)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Network nodes and connections -->
    <circle cx="16" cy="26" r="2.2" fill="#00D443"/>
    <line x1="16" y1="26" x2="12" y2="18" stroke="#00D443" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="18" r="2.2" fill="#00D443"/>
    
    <line x1="16" y1="26" x2="23" y2="19" stroke="#00D443" stroke-width="2" stroke-linecap="round"/>
    <circle cx="23" cy="19" r="2.2" fill="#00D443"/>
    
    <line x1="18" y1="28" x2="25" y2="26" stroke="#00D443" stroke-width="2" stroke-linecap="round"/>
    <circle cx="25" cy="26" r="2.2" fill="#00D443"/>
    
    <line x1="18" y1="28" x2="21" y2="37" stroke="#00D443" stroke-width="2" stroke-linecap="round"/>
    <circle cx="21" cy="37" r="2.2" fill="#00D443"/>
  </g>
  
  <!-- Text: EventEcos -->
  <text x="55" y="50" font-family="Poppins, Arial, sans-serif" font-size="36" font-weight="700" fill="#001a33">
    Event<tspan fill="#00D443">Ecos</tspan>
  </text>
</svg>