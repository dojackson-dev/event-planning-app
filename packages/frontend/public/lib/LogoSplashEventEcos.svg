<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D443;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0064FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#bgGradient)"/>
  
  <!-- Centered logo -->
  <g transform="translate(75, 30)">
    <!-- Outer leaf curve -->
    <path d="M 30 15 Q 55 8 75 40 Q 85 80 55 105 Q 35 120 25 105 Q 10 70 30 40 Z" 
          fill="none" stroke="url(#leafGradient2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner stem -->
    <path d="M 25 105 L 45 55" stroke="url(#leafGradient2)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Branch nodes in teal -->
    <circle cx="42" cy="50" r="4" fill="#00D443"/>
    <line x1="42" y1="50" x2="33" y2="35" stroke="#00D443" stroke-width="3" stroke-linecap="round"/>
    <circle cx="33" cy="35" r="4" fill="#00D443"/>
    
    <line x1="42" y1="50" x2="55" y2="38" stroke="#00D443" stroke-width="3" stroke-linecap="round"/>
    <circle cx="55" cy="38" r="4" fill="#00D443"/>
    
    <line x1="45" y1="55" x2="62" y2="50" stroke="#00D443" stroke-width="3" stroke-linecap="round"/>
    <circle cx="62" cy="50" r="4" fill="#00D443"/>
    
    <line x1="45" y1="55" x2="50" y2="75" stroke="#00D443" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="75" r="4" fill="#00D443"/>
  </g>
  
  <!-- EventEcos text -->
  <text x="150" y="195" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="700" text-anchor="middle">
    <tspan fill="#001a33">Event</tspan><tspan fill="#00D443">Ecos</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="150" y="235" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="500" fill="#666666" text-anchor="middle">
    Powering the Event Ecosystem
  </text>
</svg>